services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: humanarchive
      POSTGRES_USER: ${POSTGRES_USER:-ha_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ha_pass}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ha_user} -d humanarchive"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-ha_user}:${POSTGRES_PASSWORD:-ha_pass}@postgres:5432/humanarchive?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-prod}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      PORT: 8080
      FRAMES_DIR: /data/output
      S3_BUCKET: ${S3_BUCKET:-}
      AWS_REGION: ${AWS_REGION:-ap-south-1}
    volumes:
      - ./output:/data/output:ro
      - ${HOME}/.aws:/root/.aws:ro
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
